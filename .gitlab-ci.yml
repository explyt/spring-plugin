image: amazoncorretto:21.0.5

variables:
  BRANCH_NAME: $CI_COMMIT_REF_NAME
  BUILD_NUMBER: $CI_PIPELINE_ID

stages:
  - test
  - release
  - gitlab-release

test:
  stage: test
  rules:
    - if: $CI_COMMIT_TAG
      when: never                                             # Do not run this job when a tag is created manually
    - when: always
  script:
    - yum -y install e2fsprogs
    - ./gradlew --stacktrace --info --warning-mode all :spring-bootstrap:test -Dfile.encoding=UTF8
  artifacts:
    reports:
      junit: modules/**/build/test-results/test/TEST-*.xml

release:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
      when: never                                             # Do not run this job when a tag is created manually
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*$/
  script:
    - ESCAPED_BRANCH_NAME="$(echo "$BRANCH_NAME" | sed -e 's|release/||g' |  sed -e 's|/|_|g' )"
    - ./gradlew --info :spring-bootstrap:buildPlugin :spring-bootstrap:signPlugin :spring-bootstrap:publishPlugin -PsnapshotVersion=$BUILD_NUMBER -PdistFilePostfix=$ESCAPED_BRANCH_NAME-b$BUILD_NUMBER -PsetUntilVersion -Pobfuscate | tee build.log
    - ./gradlew :spring-bootstrap:runPluginVerifier
  artifacts:
    reports:
      dotenv: variables.env                                   # Use artifacts:reports:dotenv to expose the variables to other jobs
    paths:
      - modules/spring-bootstrap/build/reports/pluginVerifier
      - modules/spring-bootstrap/build/distributions/*.zip
      - modules/spring-bootstrap/build/distributions/source.map
      - build.log

#TODO: It will be better if we can attach artifacts by uploading to storage: generic package registry
release_job:
  stage: gitlab-release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
      when: never                                             # Do not run this job when a tag is created manually
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*$/
  script:
    - ESCAPED_BRANCH_NAME="$(echo "$BRANCH_NAME" | sed -e 's|release/||g' |  sed -e 's|/|_|g' )"
    - VERSION="$ESCAPED_BRANCH_NAME.$(date +%Y-%m-%d).$BUILD_NUMBER"
    - echo "running release_job version $VERSION"
    - |
      release-cli create \
      --name "Release $VERSION" \
      --tag-name release/$VERSION \
      --description 'Release created using the release-cli.'