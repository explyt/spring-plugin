<html>
<head>
  <title>DependsOn Inspection</title></head>
<body>
<p>
    The <b><code lang="java">@DependsOn</code></b> inspection identifies incorrect bean reference.
</p>

<p><b>Example:</b></p>
<pre><code lang="java">
  @Component
  @DependsOn("unknown")  // reports "Cannot resolve bean 'unknown'"
  public class MyComponent {
  }
</code></pre>
</body>
</html>
