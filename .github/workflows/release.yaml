name: release

on:
  push:
    branches:
      - 'release/**'

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - run: echo "ESCAPED_BRANCH_NAME=$(echo "$GITHUB_REF_NAME" | sed -e 's|release/||g' | sed -e 's|/|_|g' )" >> $GITHUB_ENV
      - name: Build Plugin
        run: ./gradlew --info :spring-bootstrap:buildPlugin -PsnapshotVersion=$GITHUB_RUN_NUMBER -PdistFilePostfix=$ESCAPED_BRANCH_NAME-b$GITHUB_RUN_NUMBER -PsetUntilVersion | tee build.log
      - name: Verify Plugin
        run: ./gradlew --info :spring-bootstrap:verifyPlugin -PsnapshotVersion=$GITHUB_RUN_NUMBER -PdistFilePostfix=$ESCAPED_BRANCH_NAME-b$GITHUB_RUN_NUMBER -PsetUntilVersion | tee -a build.log
      - name: Sign and Publish Plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew --info :spring-bootstrap:signPlugin :spring-bootstrap:publishPlugin -PsnapshotVersion=$GITHUB_RUN_NUMBER -PdistFilePostfix=$ESCAPED_BRANCH_NAME-b$GITHUB_RUN_NUMBER -PsetUntilVersion | tee -a build.log
      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-without-markdown
          compression-level: 0
          retention-days: 5
          path: |
            modules/spring-bootstrap/build/distributions/*.zip
      - name: Build log
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          compression-level: 0
          retention-days: 5
          path: |
            build.log